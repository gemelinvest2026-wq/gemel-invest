<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#0b1830" />
  <title>GEMEL INVEST</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="app-shell">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="welcome-card">
      <div class="brand-chip">GEMEL INVEST MOBILE</div>

      <div class="logo-wrap" aria-label="לוגו מערכת">
        <div class="logo-core">GI</div>
        <div class="logo-ring"></div>
      </div>

      <section class="hero-copy">
        <h1>GEMEL INVEST</h1>
        <p class="subtitle">אפליקציית הסוכנות בגרסת מובייל</p>
        <p class="description">
          שלד אפליקציה ראשוני מוכן להרצה. מכאן נתחיל לחבר את המערכת שלך,
          מסכי ה־CRM והפיצ׳רים בהמשך.
        </p>
      </section>

      <div class="status-bar">
        <span class="status-dot"></span>
        <span>האפליקציה הראשונית מוכנה להרצה</span>
      </div>

      <div class="action-stack">
        <button id="continueBtn" class="primary-btn" type="button">המשך</button>
        <button id="aboutBtn" class="secondary-btn" type="button">מה יש בגרסה הזו?</button>
      </div>

      <section id="messageBox" class="message-box hidden" aria-live="polite"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
